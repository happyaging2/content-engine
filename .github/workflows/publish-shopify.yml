name: Publish to Shopify

on:
  workflow_dispatch:
    inputs:
      batch_date:
        description: "Batch date for log label (YYYY-MM-DD) — leave blank for today"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git identity
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Run QA + Publish pipeline
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          BATCH="${{ github.event.inputs.batch_date }}"
          if [ -z "$BATCH" ]; then
            BATCH="$(date +%Y-%m-%d)"
          fi
          bash scripts/qa-and-publish.sh "$BATCH"

      - name: Commit resolved images back to repo
        run: |
          git add articles/*.meta.json articles/*-final.html 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: resolved stock images for batch $(date +%Y-%m-%d) [skip ci]"
            git push origin main
          else
            echo "Nothing to commit."
          fi
