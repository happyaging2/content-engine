name: Publish to Shopify

on:
  workflow_dispatch:
    inputs:
      batch_date:
        description: "Batch date (YYYY-MM-DD) — leave blank for today"
        required: false
        default: ""
      update_all_images:
        description: "Re-fetch images on ALL published articles after publishing"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git identity
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Step 1 — QA + Publish new batch
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          BATCH="${{ github.event.inputs.batch_date }}"
          if [ -z "$BATCH" ]; then
            BATCH="$(date +%Y-%m-%d)"
          fi
          bash scripts/qa-and-publish.sh "$BATCH"

      - name: Step 2 — Re-fetch images on ALL published articles
        if: ${{ github.event.inputs.update_all_images == 'true' }}
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          cd articles
          python3 update-images.py

      - name: Step 3 — Patch FAQ schema + section images on ALL articles
        if: ${{ github.event.inputs.update_all_images == 'true' }}
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          cd articles
          python3 patch-seo.py

      - name: Commit resolved images back to repo
        run: |
          git add articles/*.meta.json articles/*-final.html 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: resolved stock images $(date +%Y-%m-%d) [skip ci]"
            git push origin main
          else
            echo "Nothing to commit."
          fi
