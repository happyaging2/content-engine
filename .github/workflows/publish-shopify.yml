name: Publish to Shopify

on:
  # Autonomous daily run at 11:00 UTC (08:00 BRT — after the agent batch finishes)
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      batch_date:
        description: "Batch date (YYYY-MM-DD) — leave blank for today"
        required: false
        default: ""
      update_all_images:
        description: "Re-fetch images on ALL published articles after publishing"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

# Serialize publishes — also avoids racing with agent-pipeline's git push.
concurrency:
  group: publish-shopify
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git identity
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Preflight — secrets present
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: |
          set -eo pipefail
          set -x
          if [ -z "${SHOPIFY_TOKEN:-}" ]; then
            echo "::error::SHOPIFY_TOKEN secret is not set."
            exit 1
          fi
          echo "::add-mask::${SHOPIFY_TOKEN}"
          # Token validity check — `-f --show-error` makes 4xx/5xx exit non-zero
          # so a missing/expired token fails the preflight fast instead of
          # waiting 14 min for the publish step to hit auth errors.
          curl -fsS --show-error \
            -o /dev/null -w "Shopify count probe: HTTP %{http_code}\n" \
            -H "X-Shopify-Access-Token: ${SHOPIFY_TOKEN}" \
            "https://shop-happy-aging.myshopify.com/admin/api/2024-01/blogs/109440303424/articles/count.json"

      - name: Step 1 — QA + Publish new batch
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          # `pipefail` is REQUIRED so the `| tee` below doesn't mask a non-zero
          # exit from qa-and-publish.sh. GitHub Actions' default bash sets
          # pipefail today, but being explicit prevents regressions if the
          # default shell config ever changes.
          set -eo pipefail
          set -x
          BATCH="${{ github.event.inputs.batch_date }}"
          if [ -z "$BATCH" ]; then
            BATCH="$(date +%Y-%m-%d)"
          fi
          bash scripts/qa-and-publish.sh "$BATCH" 2>&1 | tee "articles/qa-${BATCH}-workflow.log"

      - name: Upload qa-and-publish log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-publish-log-${{ github.run_id }}
          path: |
            articles/qa-*.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Step 2 — Re-fetch images on ALL published articles
        if: ${{ github.event.inputs.update_all_images == 'true' }}
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          cd articles
          python3 update-images.py

      - name: Step 3 — Patch FAQ schema + section images on ALL articles
        if: ${{ github.event.inputs.update_all_images == 'true' }}
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          cd articles
          python3 patch-seo.py

      - name: Commit resolved images back to repo
        run: |
          git add articles/*.meta.json articles/*-final.html 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: resolved stock images $(date +%Y-%m-%d) [skip ci]"
            # Rebase before push to handle race with agent-pipeline.yml.
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "push failed (attempt $i) — retrying"
              sleep $((i * 2))
            done
            echo "push failed after 4 attempts" && exit 1
          else
            echo "Nothing to commit."
          fi
