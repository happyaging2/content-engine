name: Agent Pipeline (Phase 1 -> Phase 4 -> Publish as Draft)

on:
  # Daily generation: every morning 06:00 UTC. Drafts then auto-publish step
  # of qa-and-publish.sh runs at 11:00 UTC via publish-shopify.yml — that
  # gives Phase 1-4 ~5h of headroom.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      batch_date:
        description: "Batch date (YYYY-MM-DD) — leave blank for today"
        required: false
        default: ""
      batch_size:
        description: "Number of articles to generate"
        required: false
        default: "10"
      concurrency:
        description: "Max parallel writers (Phase 3)"
        required: false
        default: "5"
      dry_run:
        description: "Phase 1 only — preview topics without writing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

# Don't stack daily runs if a manual one is already going.
concurrency:
  group: agent-pipeline
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -ex
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight — secrets + imports + disk
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -ex
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set on this repo."
            echo "Fix: GitHub → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          # Mask any accidental key echo in logs.
          echo "::add-mask::${ANTHROPIC_API_KEY}"
          python3 -c "import anthropic; print('anthropic SDK', anthropic.__version__)"
          PYTHONPATH=scripts python3 -c "from agent_runner.phases import run_phase1, run_phase3_parallel, run_phase4_parallel, save_article_files; print('imports OK')"
          df -h .
          ls -la articles/ | head -5

      - name: Configure git identity
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Run pipeline (Phase 1 -> 3 -> 4)
        id: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONFAULTHANDLER: "1"
        run: |
          set -eo pipefail
          set -x
          BATCH="${{ github.event.inputs.batch_date }}"
          if [ -z "$BATCH" ]; then BATCH="$(date -u +%Y-%m-%d)"; fi
          SIZE="${{ github.event.inputs.batch_size || '10' }}"
          CONC="${{ github.event.inputs.concurrency || '5' }}"
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi

          # Stream output AND save a full log artifact for post-mortem.
          mkdir -p _run-logs
          # Use stdbuf to make sure Python's stdout is line-buffered, so tee
          # gets every line even on crash (no buffer left in flight).
          stdbuf -oL -eL python3 scripts/run-pipeline.py \
            --batch-date "$BATCH" \
            --batch-size "$SIZE" \
            --concurrency "$CONC" \
            $DRY 2>&1 | tee _run-logs/run-${BATCH}.log
          echo "EXITED OK"

      - name: Dump environment + filesystem state (always)
        if: always()
        run: |
          set +e
          echo "==== git status ===="; git status --short
          echo "==== articles/ recent ===="; ls -lt articles/ 2>/dev/null | head -20
          echo "==== _run-logs ===="; ls -la _run-logs/ 2>/dev/null
          echo "==== latest run log (last 200 lines) ===="
          tail -200 _run-logs/run-*.log 2>/dev/null

      - name: Upload run log (always)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: run-log-${{ github.run_id }}
          path: |
            _run-logs/
            articles/batch-*-report.md
            articles/*.meta.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit generated articles + meta
        run: |
          set -ex
          git add articles/*-final.html articles/*.meta.json articles/batch-*-report.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "agent-pipeline: $(date -u +%Y-%m-%d) batch [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "push failed (attempt $i) — retrying"
              sleep $((i * 2))
            done
            echo "::error::push failed after 4 attempts"
            exit 1
          else
            echo "No new articles to commit (dry run, or all rejected)."
          fi
